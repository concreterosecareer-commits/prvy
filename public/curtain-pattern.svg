<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">

  <!-- === Seamless damask / curtain tile === -->
  <!-- All strokes white on transparent; tiled at low opacity over the dark gradient -->

  <!-- Outer diamond frame (central medallion) -->
  <path d="M100 18 L182 100 L100 182 L18 100 Z"
        fill="none" stroke="white" stroke-width="0.9" opacity="0.9"/>

  <!-- Inner diamond -->
  <path d="M100 42 L158 100 L100 158 L42 100 Z"
        fill="none" stroke="white" stroke-width="0.55" opacity="0.7"/>

  <!-- Petal top -->
  <path d="M100 50 C112 64, 118 80, 100 88 C82 80, 88 64, 100 50 Z"
        fill="none" stroke="white" stroke-width="0.6" opacity="0.75"/>
  <!-- Petal bottom -->
  <path d="M100 150 C112 136, 118 120, 100 112 C82 120, 88 136, 100 150 Z"
        fill="none" stroke="white" stroke-width="0.6" opacity="0.75"/>
  <!-- Petal left -->
  <path d="M50 100 C64 88, 80 82, 88 100 C80 118, 64 112, 50 100 Z"
        fill="none" stroke="white" stroke-width="0.6" opacity="0.75"/>
  <!-- Petal right -->
  <path d="M150 100 C136 88, 120 82, 112 100 C120 118, 136 112, 150 100 Z"
        fill="none" stroke="white" stroke-width="0.6" opacity="0.75"/>

  <!-- Centre rings -->
  <circle cx="100" cy="100" r="16" fill="none" stroke="white" stroke-width="0.8" opacity="0.8"/>
  <circle cx="100" cy="100" r="8"  fill="none" stroke="white" stroke-width="0.5" opacity="0.65"/>
  <circle cx="100" cy="100" r="2.5" fill="white" opacity="0.55"/>

  <!-- Fleur top knot -->
  <path d="M96 24 Q100 18, 104 24 L102 34 Q100 36, 98 34 Z"
        fill="none" stroke="white" stroke-width="0.55" opacity="0.6"/>
  <!-- Fleur bottom knot -->
  <path d="M96 176 Q100 182, 104 176 L102 166 Q100 164, 98 166 Z"
        fill="none" stroke="white" stroke-width="0.55" opacity="0.6"/>
  <!-- Fleur left knot -->
  <path d="M24 96 Q18 100, 24 104 L34 102 Q36 100, 34 98 Z"
        fill="none" stroke="white" stroke-width="0.55" opacity="0.6"/>
  <!-- Fleur right knot -->
  <path d="M176 96 Q182 100, 176 104 L166 102 Q164 100, 166 98 Z"
        fill="none" stroke="white" stroke-width="0.55" opacity="0.6"/>

  <!-- Corner quarter-arcs — meet adjacent tiles to form full corner roses -->
  <path d="M0 0 Q22 0, 22 22" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M0 0 Q0 22, 22 22" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>

  <path d="M200 0 Q178 0, 178 22" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M200 0 Q200 22, 178 22" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>

  <path d="M0 200 Q22 200, 22 178" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M0 200 Q0 178, 22 178" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>

  <path d="M200 200 Q178 200, 178 178" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>
  <path d="M200 200 Q200 178, 178 178" fill="none" stroke="white" stroke-width="0.5" opacity="0.5"/>

  <!-- Corner dots at tile intersections -->
  <circle cx="0"   cy="0"   r="2.5" fill="white" opacity="0.35"/>
  <circle cx="200" cy="0"   r="2.5" fill="white" opacity="0.35"/>
  <circle cx="0"   cy="200" r="2.5" fill="white" opacity="0.35"/>
  <circle cx="200" cy="200" r="2.5" fill="white" opacity="0.35"/>

  <!-- Subtle vertical pleat lines — evokes draped curtain fabric -->
  <line x1="0"   y1="0" x2="0"   y2="200" stroke="white" stroke-width="0.25" opacity="0.2"/>
  <line x1="50"  y1="0" x2="50"  y2="200" stroke="white" stroke-width="0.15" opacity="0.12"/>
  <line x1="100" y1="0" x2="100" y2="200" stroke="white" stroke-width="0.2"  opacity="0.15"/>
  <line x1="150" y1="0" x2="150" y2="200" stroke="white" stroke-width="0.15" opacity="0.12"/>
  <line x1="200" y1="0" x2="200" y2="200" stroke="white" stroke-width="0.25" opacity="0.2"/>

</svg>
